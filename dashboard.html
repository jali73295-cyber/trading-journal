<!DOCTYPE html>
<html lang="en" data-theme="dark" data-fs="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Dashboard · TradeLog Pro</title>
  <meta name="description" content="TradeLog Pro — performance dashboard.">
  <meta name="theme-color" content="#070b14">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script>
    try { var s = JSON.parse(localStorage.getItem('tj.settings') || '{}'); var d = document.documentElement;
      d.dataset.theme = s.theme || 'dark'; d.dataset.fs = s.fontSize || 'md';
      if (s.accent) d.style.setProperty('--accent', s.accent); } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">
  <div class="bg-orbs" aria-hidden="true"><div class="orb o1"></div><div class="orb o2"></div></div>
  <div class="app">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar"></aside>
    <div class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" aria-label="Open menu"></button>
        <div class="tb-left">
          <h1>Dashboard</h1>
          <p class="sub" id="dashSub">Your edge, at a glance.</p>
        </div>
        <div class="tb-actions">
          <button class="btn" id="aiReviewBtn"><span class="lbl">AI Review</span></button>
          <a class="btn btn-primary" href="trade.html"><span class="lbl">New Trade</span></a>
        </div>
      </header>
      <main class="content" id="dashRoot"></main>
    </div>
  </div>
  <div id="toasts" aria-live="polite"></div>

  <script defer src="chart.umd.min.js"></script>
  <script defer src="storage.js"></script>
  <script defer src="images.js"></script>
  <script defer src="metrics.js"></script>
  <script defer src="ui.js"></script>
  <script defer src="charts.js"></script>
  <script defer src="script.js"></script>
  <script src="ai.js"></script>
  <script defer src="dashboard.js"></script>
</body>
</html>
