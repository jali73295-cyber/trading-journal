<!DOCTYPE html>
<html lang="en" data-theme="dark" data-fs="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trade · TradeLog Pro</title>
  <meta name="description" content="TradeLog Pro — log and review a trade.">
  <meta name="theme-color" content="#070b14">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script>
    try { var s = JSON.parse(localStorage.getItem('tj.settings') || '{}'); var d = document.documentElement;
      d.dataset.theme = s.theme || 'dark'; d.dataset.fs = s.fontSize || 'md';
      if (s.accent) d.style.setProperty('--accent', s.accent); } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="trade">
  <div class="bg-orbs" aria-hidden="true"><div class="orb o1"></div><div class="orb o2"></div></div>
  <div class="app">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar"></aside>
    <div class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" aria-label="Open menu"></button>
        <div class="tb-left">
          <h1 id="tradeTitle">New Trade</h1>
          <p class="sub" id="tradeSub">Log it while it's fresh.</p>
        </div>
        <div class="tb-actions" id="tradeActions"></div>
      </header>
      <main class="content narrow" id="tradeRoot"></main>
    </div>
  </div>
  <div id="toasts" aria-live="polite"></div>

  <script defer src="js/storage.js"></script>
  <script defer src="js/images.js"></script>
  <script defer src="js/metrics.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="script.js"></script>
  <script defer src="js/trade.js"></script>
</body>
</html>
